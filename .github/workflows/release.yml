name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (e.g. v1.0.1)'
        required: true

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Resolve the tag name from either trigger type.
      # For push-tag triggers github.ref_name is already the tag.
      # For workflow_dispatch the tag comes from the input.
      - name: Set release tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME:  ${{ github.ref_name }}
        run: |
          TAG="${INPUT_TAG:-$REF_NAME}"
          echo "name=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.name }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware (m5stickc-plus2)
        run: pio run -e m5stickc-plus2

      - name: Merge bootloader + partition table + app into single flashable image
        env:
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          pip install esptool
          python -m esptool --chip esp32 merge_bin \
            --output "firmware-${TAG}-m5stickc-plus2.bin" \
            0x1000  .pio/build/m5stickc-plus2/bootloader.bin \
            0x8000  .pio/build/m5stickc-plus2/partitions.bin \
            0x10000 .pio/build/m5stickc-plus2/firmware.bin

      - name: Create or update GitHub Release and upload firmware
        env:
          TAG:      ${{ steps.tag.outputs.name }}
          ASSET:    firmware-${{ steps.tag.outputs.name }}-m5stickc-plus2.bin
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${TAG}" --title "${TAG}" --generate-notes 2>/dev/null || true
          gh release upload "${TAG}" "${ASSET}" --clobber
