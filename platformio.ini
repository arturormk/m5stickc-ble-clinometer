[env]
platform = espressif32@6.1.0
framework = arduino
board_build.partitions = huge_app.csv
build_flags = -DCORE_DEBUG_LEVEL=0
lib_deps = m5stack/M5Unified
lib_ignore = DFRobot_GP8XXX
default_envs = m5stickc-plus2, m5stack-core2

[env:m5stickc-plus2]
board = m5stick-c
build_flags = ${env.build_flags} -DIMU_LONG_AXIS_IS_Y=1

[env:m5stack-core2]
board = m5stack-core2
; Note: Core2 axis mapping (-DIMU_LONG_AXIS_IS_Y=0) may need empirical verification.
build_flags = ${env.build_flags} -DIMU_LONG_AXIS_IS_Y=0

; CoreS3 requires espressif32 >= 7.x for its board definition.
; Not built by default. To target it: pio run -e m5stack-cores3
[env:m5stack-cores3]
platform = espressif32@^7.0.0
board = m5stack-cores3
; Note: CoreS3 axis mapping (-DIMU_LONG_AXIS_IS_Y=0) may need empirical verification.
build_flags = ${env.build_flags} -DIMU_LONG_AXIS_IS_Y=0
