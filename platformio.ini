[platformio]
default_envs = m5stickc-plus2

[env]
platform = espressif32@^7.0.1
framework = arduino
board_build.partitions = huge_app.csv
build_flags = -DCORE_DEBUG_LEVEL=0
lib_deps = m5stack/M5Unified
lib_ignore = DFRobot_GP8XXX

[env:m5stickc-plus2]
board = m5stick-c

[env:m5stack-core2]
board = m5stack-core2

; Grey has no onboard RTC; SET_TIME must be re-sent after each reboot.
; Not built by default. To target it: pio run -e m5stack-grey
[env:m5stack-grey]
board = m5stack-grey

; CoreS3 requires espressif32 >= 7.x for its board definition.
; Not built by default. To target it: pio run -e m5stack-cores3
[env:m5stack-cores3]
board = m5stack-cores3

; M5StickS3 has no onboard RTC; SET_TIME must be re-sent after each reboot.
; Not built by default. To target it: pio run -e mstickS3
; COM port settings are machine-specific — put them in platformio.ini.local
[env:mstickS3]
board = esp32-s3-devkitc-1
board_build.arduino.partitions = default_8MB.csv
board_build.arduino.memory_type = qio_opi

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCONFIG_BT_BTC_TASK_STACK_SIZE=10240

lib_deps =
    M5Unified=https://github.com/m5stack/M5Unified
    M5PM1=https://github.com/m5stack/M5PM1
